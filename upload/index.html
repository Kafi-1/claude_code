<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Claude Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f4ef;--sidebar:#ede9e3;--white:#fff;--text:#1a1a1a;--sub:#666;--border:#e0ddd7;--accent:#d97757;--input-bg:#fff}

html,body{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:15px;position:fixed;inset:0}

/* Sidebar */
#sidebar{width:260px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);position:fixed;left:-260px;top:0;height:100%;z-index:50;transition:.3s}
#sidebar.open{left:0}
#sidebar-top{padding:12px;border-bottom:1px solid var(--border)}
#new-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);text-align:left;display:flex;align-items:center;gap:8px}
#new-btn:hover{background:var(--border)}
#history{flex:1;overflow-y:auto;padding:8px}
.hist-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.hist-item:hover,.hist-item.active{background:var(--border);color:var(--text)}
#sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.model-sel{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--white);font-size:13px;color:var(--text)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden}
#topbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
#menu-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--sub);padding:4px 8px}
#topbar h1{font-size:16px;font-weight:600}
#status{margin-left:auto;font-size:12px;color:var(--sub);white-space:nowrap}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.user .avatar{background:var(--accent);color:#fff}
.msg.bot .avatar{background:#e8e4dc}
.bubble{max-width:85%;padding:10px 14px;border-radius:18px;line-height:1.6;font-size:14px;word-break:break-word}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:var(--white);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble pre{background:#f0ede8;padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:12px;white-space:pre-wrap}
.bubble code{font-family:monospace;font-size:13px}
.bubble strong{font-weight:600}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{display:inline-block;width:7px;height:7px;background:var(--sub);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* Empty */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:8px;text-align:center;padding:20px}
#empty h2{font-size:20px;color:var(--text);font-weight:600}
#empty p{font-size:13px}

/* Input Area - fixed at bottom */
#input-area{
  padding:10px 12px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
#input-box{
  display:flex;
  align-items:flex-end;
  background:var(--input-bg);
  border:1.5px solid var(--border);
  border-radius:24px;
  padding:8px 8px 8px 14px;
  gap:6px;
}
#input-box:focus-within{border-color:var(--accent)}
#inp{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  font-size:15px;
  background:transparent;
  color:var(--text);
  max-height:100px;
  min-height:24px;
  line-height:1.5;
  font-family:inherit;
  padding:0;
}
#inp::placeholder{color:#aaa}
#send-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--accent);
  border:none;cursor:pointer;
  color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
#send-btn:active{transform:scale(.92)}
#send-btn:disabled{background:#ccc;cursor:default}
#attach-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:transparent;
  border:none;cursor:pointer;
  color:var(--sub);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
#attach-btn:hover{background:var(--border);color:var(--text)}
#attach-btn:active{transform:scale(.92)}
#attach-preview{display:flex;gap:6px;flex-wrap:wrap;padding:0 4px 8px 4px}
.attach-chip{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:12px;color:var(--text);max-width:160px}
.attach-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-chip button{border:none;background:none;cursor:pointer;color:var(--sub);font-size:14px;line-height:1;padding:0}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49}
#overlay.show{display:block}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-top">
    <button id="new-btn" onclick="newChat()">✏️ New Chat</button>
  </div>
  <div id="history"></div>
  <div id="sidebar-bottom">
    <select class="model-sel" id="model-sel">
      <option value="claude-opus-4-6">Claude Opus 4.6</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
    </select>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <h1>Claude Chat</h1>
    <span id="status">🔄 Connecting...</span>
  </div>

  <div id="messages">
    <div id="empty">
      <h2>Claude Chat</h2>
      <p>Start a conversation below</p>
    </div>
  </div>

  <div id="input-area">
    <div id="attach-preview"></div>
    <div id="input-box">
      <input type="file" id="file-inp" style="display:none" multiple
        accept="image/*,.pdf,.txt,.html,.htm" onchange="handleFiles(this.files)">
      <button id="attach-btn" onclick="document.getElementById('file-inp').click()" title="Attach file">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea id="inp" rows="1" placeholder="Message Claude..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="send()" title="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem('chats')||'[]');
let currentId = null;
let isLoading = false;
let pendingAttachments = []; // {name, path, uploading}

function handleFiles(fileList){
  [...fileList].forEach(file => {
    const id = Math.random().toString(36).slice(2);
    pendingAttachments.push({ id, name: file.name, path: null, uploading: true });
    renderAttachPreview();

    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await fetch('/upload', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ filename: file.name, dataBase64: base64 })
        });
        const data = await res.json();
        const item = pendingAttachments.find(a => a.id === id);
        if(item){ item.uploading = false; item.path = data.path || null; }
      } catch(e){
        const item = pendingAttachments.find(a => a.id === id);
        if(item){ item.uploading = false; item.error = true; }
      }
      renderAttachPreview();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('file-inp').value = '';
}

function removeAttachment(id){
  pendingAttachments = pendingAttachments.filter(a => a.id !== id);
  renderAttachPreview();
}

function renderAttachPreview(){
  const el = document.getElementById('attach-preview');
  if(!pendingAttachments.length){ el.innerHTML = ''; return; }
  el.innerHTML = pendingAttachments.map(a => `
    <div class="attach-chip">
      <span>${a.uploading ? '⏳ ' : (a.error ? '⚠️ ' : '📎 ')}${escHtml(a.name)}</span>
      <button onclick="removeAttachment('${a.id}')">✕</button>
    </div>
  `).join('');
}

// Get config from server
fetch('/config').then(r=>r.json()).then(cfg=>{
  document.getElementById('model-sel').value = cfg.model || 'claude-opus-4-6';
  document.getElementById('status').textContent = cfg.hasKey ? '🟢 Ready' : '🔴 No API Key';
}).catch(()=>{
  document.getElementById('status').textContent = '🔴 Server Error';
});

function newChat(){
  currentId = Date.now().toString();
  chats.unshift({id:currentId, title:'New Chat', messages:[]});
  save(); renderHistory(); renderMessages([]); closeSidebar();
  document.getElementById('inp').focus();
}

function save(){ localStorage.setItem('chats', JSON.stringify(chats)); }

function renderHistory(){
  document.getElementById('history').innerHTML = chats.map(c=>
    `<div class="hist-item ${c.id===currentId?'active':''}" onclick="loadChat('${c.id}')">${escHtml(c.title)}</div>`
  ).join('');
}

function loadChat(id){
  currentId = id;
  const c = chats.find(x=>x.id===id);
  renderMessages(c ? c.messages : []);
  renderHistory(); closeSidebar();
}

function renderMessages(msgs){
  const el = document.getElementById('messages');
  if(!msgs.length){
    el.innerHTML = '<div id="empty"><h2>Claude Chat</h2><p>Start a conversation below</p></div>';
    return;
  }
  el.innerHTML = msgs.map(m=>msgHTML(m.role, m.content)).join('');
  el.scrollTop = el.scrollHeight;
}

function msgHTML(role, content){
  const isUser = role === 'user';
  return `<div class="msg ${isUser?'user':'bot'}">
    <div class="avatar">${isUser?'👤':'🤖'}</div>
    <div class="bubble">${fmt(content)}</div>
  </div>`;
}

function fmt(t){
  t = escHtml(t);
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, content){
  const el = document.getElementById('messages');
  const empty = document.getElementById('empty');
  if(empty) empty.remove();
  el.insertAdjacentHTML('beforeend', msgHTML(role, content));
  el.scrollTop = el.scrollHeight;
}

function addTyping(){
  const el = document.getElementById('messages');
  const empty = document.getElementById('empty');
  if(empty) empty.remove();
  el.insertAdjacentHTML('beforeend',
    `<div class="msg bot" id="typing-msg">
      <div class="avatar">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`);
  el.scrollTop = el.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typing-msg');
  if(t) t.remove();
}

async function send(){
  if(isLoading) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  const attachments = pendingAttachments.filter(a => a.path).map(a => a.path);
  if(!text && !attachments.length) return;
  if(!currentId) newChat();

  const chat = chats.find(c=>c.id===currentId);
  if(!chat) return;

  let displayText = text;
  if(attachments.length) {
    const names = pendingAttachments.map(a=>a.name).join(', ');
    displayText = (text ? text + '\n\n' : '') + '📎 ' + names;
  }

  chat.messages.push({role:'user', content:displayText});
  if(chat.title === 'New Chat') chat.title = (text || 'Attachment').slice(0,30);
  save(); renderHistory();

  inp.value = ''; autoResize(inp);
  appendMsg('user', displayText);
  pendingAttachments = []; renderAttachPreview();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  const model = document.getElementById('model-sel').value;

  try{
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({messages: chat.messages, model, attachments})
    });
    const data = await res.json();
    const reply = data?.content?.[0]?.text || data?.error?.message || 'কোনো উত্তর পাওয়া যায়নি।';
    chat.messages.push({role:'assistant', content:reply});
    save(); removeTyping(); appendMsg('bot', reply);
  } catch(e){
    removeTyping();
    appendMsg('bot', '❌ Error: ' + e.message);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

renderHistory();
</script>
</body>
</html>
